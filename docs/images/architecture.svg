<svg width="900" height="520" viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="900" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="blue_grad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1e2d4f"/>
    </linearGradient>
    <linearGradient id="green_grad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a3a2e"/>
      <stop offset="100%" stop-color="#142e23"/>
    </linearGradient>
    <linearGradient id="purple_grad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#211440"/>
    </linearGradient>
    <linearGradient id="orange_grad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3a2000"/>
      <stop offset="100%" stop-color="#2e1800"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrow_blue" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="url(#bg2)" rx="16"/>
  <rect width="900" height="520" fill="none" stroke="#1e293b" stroke-width="1.5" rx="16"/>

  <!-- Title -->
  <text x="450" y="40" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#94a3b8" text-anchor="middle">System Architecture</text>
  <line x1="200" y1="52" x2="700" y2="52" stroke="#1e293b" stroke-width="1"/>

  <!-- Layer 1: Browser -->
  <rect x="50" y="70" width="800" height="90" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="70" y="94" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b" font-weight="600">LAYER 1 — BROWSER</text>
  <rect x="80" y="102" width="160" height="44" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="160" y="119" font-family="'Segoe UI', sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="600">Next.js 16</text>
  <text x="160" y="135" font-family="'Segoe UI', sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">React 19 + TypeScript</text>
  <rect x="260" y="102" width="140" height="44" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="330" y="119" font-family="'Segoe UI', sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="600">Zustand Store</text>
  <text x="330" y="135" font-family="'Segoe UI', sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Global state + SSE</text>
  <rect x="420" y="102" width="160" height="44" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="500" y="119" font-family="'Segoe UI', sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="600">lightweight-charts</text>
  <text x="500" y="135" font-family="'Segoe UI', sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">Candlestick + Volume</text>
  <rect x="600" y="102" width="220" height="44" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="710" y="119" font-family="'Segoe UI', sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="600">Recharts + Tailwind CSS</text>
  <text x="710" y="135" font-family="'Segoe UI', sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle">29 components · EN/中文</text>

