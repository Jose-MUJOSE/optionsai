  <rect x="460" y="306" width="390" height="80" rx="10" fill="#1a2535" stroke="#334155" stroke-width="1.5"/>
  <text x="480" y="328" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b" font-weight="600">LAYER 3B — REAL DATA SOURCES</text>
  <rect x="480" y="334" width="110" height="40" rx="6" fill="#3a2000" stroke="#f59e0b" stroke-width="1"/>
  <text x="535" y="349" font-family="'Segoe UI', sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="600">Yahoo Finance</text>
  <text x="535" y="364" font-family="'Segoe UI', sans-serif" font-size="9" fill="#fcd34d" text-anchor="middle">Price · Options · IV</text>
  <rect x="605" y="334" width="100" height="40" rx="6" fill="#3a2000" stroke="#f59e0b" stroke-width="1"/>
  <text x="655" y="349" font-family="'Segoe UI', sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="600">Polygon.io</text>
  <text x="655" y="364" font-family="'Segoe UI', sans-serif" font-size="9" fill="#fcd34d" text-anchor="middle">Backup · OHLCV</text>
  <rect x="720" y="334" width="115" height="40" rx="6" fill="#3a2000" stroke="#f59e0b" stroke-width="1"/>
  <text x="777" y="349" font-family="'Segoe UI', sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="600">FINRA RegSHO</text>
  <text x="777" y="364" font-family="'Segoe UI', sans-serif" font-size="9" fill="#fcd34d" text-anchor="middle">Short Volume</text>

