  <text x="155" y="253" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">BSM · Backtest · Rank</text>
  <rect x="250" y="220" width="160" height="44" rx="6" fill="#2d1b4e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="330" y="237" font-family="'Segoe UI', sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="600">Agent Orchestrator</text>
  <text x="330" y="253" font-family="'Segoe UI', sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">Researcher→Analyst→Verifier</text>
  <rect x="430" y="220" width="150" height="44" rx="6" fill="#1a3a2e" stroke="#10b981" stroke-width="1"/>
  <text x="505" y="237" font-family="'Segoe UI', sans-serif" font-size="12" fill="#34d399" text-anchor="middle" font-weight="600">AI Assistant</text>
  <text x="505" y="253" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">OpenAI · Vision · Stream</text>
  <rect x="600" y="220" width="220" height="44" rx="6" fill="#1a3a2e" stroke="#10b981" stroke-width="1"/>
  <text x="710" y="237" font-family="'Segoe UI', sans-serif" font-size="12" fill="#34d399" text-anchor="middle" font-weight="600">Data Fetcher</text>
  <text x="710" y="253" font-family="'Segoe UI', sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle">async httpx · Yahoo · Polygon</text>

  <!-- Arrow 2 -->
  <line x1="450" y1="278" x2="450" y2="303" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="5,3"/>

