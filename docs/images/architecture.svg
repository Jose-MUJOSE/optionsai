  <rect x="100" y="415" width="700" height="82" rx="10" fill="#110e1a" stroke="#4c1d95" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="450" y="436" font-family="'Segoe UI', sans-serif" font-size="11" fill="#7c3aed" text-anchor="middle" font-weight="600">MULTI-AGENT PIPELINE (SSE streaming)</text>
  <rect x="130" y="444" width="170" height="40" rx="6" fill="#1f0a3a" stroke="#7c3aed" stroke-width="1"/>
  <text x="215" y="459" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c084fc" text-anchor="middle" font-weight="600">① Researcher</text>
  <text x="215" y="474" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a855f7" text-anchor="middle">Parallel data gather</text>
  <rect x="365" y="444" width="170" height="40" rx="6" fill="#1f0a3a" stroke="#7c3aed" stroke-width="1"/>
  <text x="450" y="459" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c084fc" text-anchor="middle" font-weight="600">② Analyst</text>
  <text x="450" y="474" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a855f7" text-anchor="middle">Streaming LLM analysis</text>
  <rect x="600" y="444" width="170" height="40" rx="6" fill="#1f0a3a" stroke="#7c3aed" stroke-width="1"/>
  <text x="685" y="459" font-family="'Segoe UI', sans-serif" font-size="11" fill="#c084fc" text-anchor="middle" font-weight="600">③ Verifier</text>
  <text x="685" y="474" font-family="'Segoe UI', sans-serif" font-size="9" fill="#a855f7" text-anchor="middle">JSON consistency check</text>
  <line x1="300" y1="464" x2="365" y2="464" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow_blue)"/>
  <line x1="535" y1="464" x2="600" y2="464" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow_blue)"/>

  <!-- Connection lines from layer 2 to layer 3 -->
  <line x1="330" y1="278" x2="235" y2="306" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="500" y1="278" x2="655" y2="306" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
