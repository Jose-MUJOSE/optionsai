  <rect x="50" y="306" width="370" height="80" rx="10" fill="#1a2535" stroke="#334155" stroke-width="1.5"/>
  <text x="70" y="328" font-family="'Segoe UI', sans-serif" font-size="11" fill="#64748b" font-weight="600">LAYER 3A — LLM PROVIDER</text>
  <rect x="80" y="334" width="150" height="40" rx="6" fill="#2d1b4e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="155" y="348" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">DeepSeek</text>
  <text x="155" y="364" font-family="'Segoe UI', sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">default · fast</text>
  <rect x="250" y="334" width="150" height="40" rx="6" fill="#2d1b4e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="325" y="348" font-family="'Segoe UI', sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">GPT-4o / Any</text>
  <text x="325" y="364" font-family="'Segoe UI', sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">vision · configurable</text>

